<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List Fix</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        button:hover { background: #444; }
        #tier-list { border: 2px solid #000; background: #000; display: flex; flex-direction: column; gap: 2px; }
        .row { display: flex; min-height: 80px; background: #1e1e1e; }
        .label { width: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; text-align: center; padding: 5px; }
        .zone { flex-grow: 1; padding: 5px; display: flex; flex-wrap: wrap; gap: 5px; background: #1a1a1a; min-width: 200px; }
        .item { width: 70px; height: 70px; object-fit: cover; cursor: move; }
        #pool { margin-top: 20px; border: 2px dashed #444; min-height: 100px; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="addBtn">Dodaj Tier</button>
        <button id="imgBtn">Dodaj Zdjęcia</button>
        <button id="clearBtn">Wyczyść wszystko</button>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    </div>

    <div id="tier-list"></div>
    
    <div id="pool"></div>

    <script>
        // Funkcje przypisujemy po załadowaniu DOM, żeby uniknąć błędów "null"
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('tier-list');
            const pool = document.getElementById('pool');
            const fileInput = document.getElementById('fileInput');

            // 1. Dodawanie wiersza
            document.getElementById('addBtn').onclick = () => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `
                    <div class="label" contenteditable="true" style="background:#ff7f7f">Nowy</div>
                    <div class="zone"></div>
                `;
                // Obsługa dropu na nowym wierszu
                const zone = row.querySelector('.zone');
                zone.ondragover = (e) => e.preventDefault();
                zone.ondrop = (e) => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData('text');
                    const el = document.getElementById(id);
                    if(el) zone.appendChild(el);
                };
                list.appendChild(row);
            };

            // 2. Obsługa zdjęć
            document.getElementById('imgBtn').onclick = () => fileInput.click();
            
            fileInput.onchange = (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.className = 'item';
                        img.id = 'img_' + Math.random().toString(36).substr(2, 9);
                        img.draggable = true;
                        img.ondragstart = (ev) => ev.dataTransfer.setData('text', img.id);
                        pool.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            };

            // 3. Czyszczenie
            document.getElementById('clearBtn').onclick = () => {
                if(confirm("Czy na pewno?")) location.reload();
            };

            // Domyślne strefy dla poola
            pool.ondragover = (e) => e.preventDefault();
            pool.ondrop = (e) => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text');
                const el = document.getElementById(id);
                if(el) pool.appendChild(el);
            };

            // Dodaj startowe tiery
            document.getElementById('addBtn').click();
            document.getElementById('addBtn').click();
        });
    </script>
</body>
</html>
